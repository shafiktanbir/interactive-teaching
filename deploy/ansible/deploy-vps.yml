---
- name: Provision and deploy Interactive Teaching
  hosts: vps
  become: true
  vars:
    app_dir: "/opt/interactive-teaching"
    env_file: ".env.local"
    nginx_site_path: "/etc/nginx/sites-available/interactive-teaching.conf"
    nginx_site_link: "/etc/nginx/sites-enabled/interactive-teaching.conf"

  tasks:
    - name: Install required OS packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - nginx
        state: present

    - name: Ensure nginx service is enabled and running
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Check app directory exists
      ansible.builtin.stat:
        path: "{{ app_dir }}"
      register: app_dir_stat

    - name: Fail when app directory is missing
      ansible.builtin.fail:
        msg: "App directory {{ app_dir }} does not exist on VPS."
      when: not app_dir_stat.stat.exists

    - name: Check env file exists
      ansible.builtin.stat:
        path: "{{ app_dir }}/{{ env_file }}"
      register: env_file_stat

    - name: Fail when .env.local is missing
      ansible.builtin.fail:
        msg: "Missing {{ env_file }} in {{ app_dir }}."
      when: not env_file_stat.stat.exists

    - name: Enforce secure permission on env file
      ansible.builtin.file:
        path: "{{ app_dir }}/{{ env_file }}"
        mode: "0600"

    - name: Write HTTP nginx config
      ansible.builtin.template:
        src: reverse-proxy-http.conf.j2
        dest: "{{ nginx_site_path }}"
        mode: "0644"
      notify: Reload nginx safely

    - name: Enable nginx site
      ansible.builtin.file:
        src: "{{ nginx_site_path }}"
        dest: "{{ nginx_site_link }}"
        state: link
        force: true

    - name: Disable default nginx site when present
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Assert Ubuntu default nginx site is not enabled
      ansible.builtin.stat:
        path: /etc/nginx/sites-enabled/default
      register: nginx_default_site
      failed_when: nginx_default_site.stat.exists | default(false)

    - name: Flush nginx changes
      ansible.builtin.meta: flush_handlers

    - name: Install Docker Engine and Docker Compose v2 (Ubuntu)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    # Avoid forced reconnect in CI; docker commands below run with become.
    # - name: Reset SSH connection so docker group applies
    #   ansible.builtin.meta: reset_connection

    - name: Check docker compose file present (deploy bundle from CI)
      become: false
      ansible.builtin.stat:
        path: "{{ app_dir }}/docker-compose.yml"
      register: compose_file_stat

    - name: Fail when docker-compose.yml missing
      ansible.builtin.fail:
        msg: "Missing {{ app_dir }}/docker-compose.yml. CI must rsync the app before this playbook runs."
      when: not compose_file_stat.stat.exists

    - name: Validate docker compose config
      become: true
      ansible.builtin.command: docker compose --env-file "{{ env_file }}" config
      args:
        chdir: "{{ app_dir }}"
      changed_when: false

    - name: Pull docker images (best effort)
      become: true
      ansible.builtin.command: docker compose --env-file "{{ env_file }}" pull
      args:
        chdir: "{{ app_dir }}"
      changed_when: false
      failed_when: false

    - name: Check active swap
      ansible.builtin.command: swapon --noheadings --show=NAME
      register: swap_status
      changed_when: false
      failed_when: false

    - name: Ensure 1G swap file exists when no active swap
      when: (swap_status.stdout | trim) == ""
      block:
        - name: Allocate swapfile
          ansible.builtin.command: fallocate -l 1G /swapfile
          args:
            creates: /swapfile

        - name: Set swapfile permissions
          ansible.builtin.file:
            path: /swapfile
            owner: root
            group: root
            mode: "0600"

        - name: Format swapfile
          ansible.builtin.command: mkswap /swapfile
          changed_when: true

        - name: Enable swapfile
          ansible.builtin.command: swapon /swapfile
          changed_when: true

        - name: Persist swapfile in fstab
          ansible.builtin.lineinfile:
            path: /etc/fstab
            regexp: '^/swapfile\s'
            line: '/swapfile none swap sw 0 0'
            state: present

    - name: Build docker services
      become: true
      ansible.builtin.command: env DOCKER_BUILDKIT=0 COMPOSE_DOCKER_CLI_BUILD=0 docker compose --env-file "{{ env_file }}" build
      args:
        chdir: "{{ app_dir }}"

    - name: Run docker stack
      become: true
      ansible.builtin.command: docker compose --env-file "{{ env_file }}" up -d --remove-orphans
      args:
        chdir: "{{ app_dir }}"

    - name: Show compose services status
      become: true
      ansible.builtin.command: docker compose --env-file "{{ env_file }}" ps
      args:
        chdir: "{{ app_dir }}"
      changed_when: false

  handlers:
    - name: Reload nginx safely
      ansible.builtin.command: nginx -t
      changed_when: false
      notify: Reload nginx service

    - name: Reload nginx service
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
